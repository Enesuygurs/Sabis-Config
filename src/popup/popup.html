<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SABİS Config</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-main">
                <img src="../../assets/images/icon48.png" alt="SABİS Config Logo" class="logo" id="headerLogo">
                <button id="backToMainBtnHeader" class="btn-icon btn-back-header hidden" title="Geri">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5z"/>
                    </svg>
                </button>
                <h1 id="headerTitle">SABİS Config</h1>
            </div>
            <button id="openSettingsBtn" class="btn-icon btn-settings btn-header-action" title="Ayarlar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311a1.464 1.464 0 0 1-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413-1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 1 1 0-5.858 2.929 2.929 0 0 1 0 5.858z"/>
                </svg>
            </button>
        </header>

        <div id="mainContent" class="content-section">
            <div class="student-info-card" id="studentInfoCard">
                 <img src="../../assets/images/icon48.png" alt="Öğrenci Fotoğrafı" class="student-photo" id="studentPhoto">
                 <div class="student-details">
                     <p class="student-name" id="studentName">Yükleniyor...</p>
                     <p class="student-department" id="studentDepartment">Yükleniyor...</p>
                     <p class="student-id" id="studentNumber">Yükleniyor...</p>
                     <p class="student-gno" id="studentGNO">GNO: Yükleniyor...</p>
                 </div>
                 <div class="student-actions">
                      <button id="refreshStudentInfo" class="btn-refresh" title="Bilgileri Yenile">
                         <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                             <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                             <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                         </svg>
                     </button>
                 </div>
            </div>
            <div class="balance-card" id="balanceCard">
                <div class="balance-info">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-credit-card-2-front balance-icon" viewBox="0 0 16 16">
                        <path d="M14 3a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h12zM2 2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H2z"/>
                        <path d="M2 5.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1-.5-.5v-1zm0 3a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 3a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5zm3 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5z"/>
                    </svg>
                    <p class="balance-text" id="studentBalance">Yükleniyor...</p>
                </div>
                <button id="loadBalanceBtn" class="btn btn-small btn-balance-load">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3v-3z"/>
                    </svg>
                    Bakiye Yükle
                </button>
            </div>
             <div class="food-menu-card" id="foodMenuCard">
                 <div class="food-menu-header">
                     <div class="food-menu-header-main">
                     <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="food-menu-icon" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m-3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2m0 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
                     </svg>
                     <h3 class="food-menu-title" id="foodMenuTitle">Bugünün Menüsü</h3>
                 </div>
                 <button id="toggleFoodMenuTypeBtn" class="btn-icon btn-food-menu-toggle" title="Menü Tipini Değiştir">
                     <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-arrows-exchange" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M1 11.5a.5.5 0 0 0 .5.5h11.586l-2.293 2.293a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 1 0-.708.708L13.086 11H1.5a.5.5 0 0 0-.5.5zm14-7a.5.5 0 0 1-.5.5H2.914l2.293-2.293a.5.5 0 0 1-.708-.708l-3.5 3.5a.5.5 0 0 1 0 .708l3.5 3.5a.5.5 0 0 1 .708-.708L2.914 6H14.5a.5.5 0 0 1 .5-.5Z"/>
                    </svg>
                    </button>
                 </div>
                 <ul class="food-menu-list" id="foodMenuList">
                     <li class="placeholder">Yükleniyor...</li>
                 </ul>
                 <a href="https://menu.sabis.sakarya.edu.tr/" target="_blank" class="food-menu-link">Tüm Menüyü Gör</a>
            </div>
        </div>

        <div id="settingsContent" class="content-section hidden">
             <div class="button-group">
                <button id="changeGrades" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                        <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z"/>
                    </svg>
                    Notları Değiştir
                </button>
                <button id="autoFillSurvey" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M7 2.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5v-1zM2 1a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm0 8a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2H2zm.854-3.646a.5.5 0 0 1-.708 0l-1-1a.5.5 0 1 1 .708-.708l.646.647 1.646-1.647a.5.5 0 1 1 .708.708l-2 2zm0 8a.5.5 0 0 1-.708 0l-1-1a.5.5 0 0 1 .708-.708l.646.647 1.646-1.647a.5.5 0 0 1 .708.708l-2 2zM7 10.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5v-1zm0-5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 8a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/>
                    </svg>
                    Anketi Doldur
                </button>
                 <button id="goToExamSchedule" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                        <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/>
                    </svg>
                    Sınav Takvimi
                </button>
                <button id="checkQuestions" class="btn btn-secondary">
                     <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M10.354 6.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                        <path d="m10.273 2.513-.921-.944.715-.69c.6-1.278.039-2.118-.864-2.118-1.006 0-1.502.752-1.735 1.174-.24.434-.526.956-.847 1.176-.42.287-1.002.255-1.492.01L2.705 1.87.69 3.143l.944.921.008.008.058.058.018.018.827.828.009.009.005.005.014.014.008.008.005.005.009.009.01.01.046.045.008.007.05.049.005.004.042.04.015.014.004.004.028.026.005.004.04.035.004.003.032.028.005.004.024.02.005.004.017.014.004.003.012.01.005.004.006.005.004.003.01.007.004.003.005.004.004.003.003.002l.003.002.002.002.002.001h.002Z"/>
                        <path d="M10.067 4.97a.5.5 0 0 0-.707-.707l-1.57 1.57c-.351-.148-.69-.34-.994-.578a.5.5 0 0 0-.58.053L5.04 6.61a.5.5 0 0 0 .03.745l1.562 1.226c.19.149.406.275.63.388l1.172 2.856a.5.5 0 0 0 .95.063l1.19-2.635 1.844 1.435a.5.5 0 0 0 .665-.146l.903-1.204a.5.5 0 0 0-.13-.732l-1.746-1.262a4.98 4.98 0 0 1-.99.429l-.926-.926.99-.429c.098-.042.196-.087.293-.136l.99-.454ZM3.659 11.01a4.015 4.015 0 0 0-2.101-3.207.5.5 0 0 0-.85.385v1.94a.5.5 0 0 0 .057.227l.004.009.012.024.022.043.036.064.05.086.066.107.082.129.03.046c.032.047.066.092.102.136.036.043.074.086.114.126.04.04.083.078.127.114.045.037.09.07.137.1.046.03.094.057.143.081.05.024.098.045.148.064.05.02.102.037.154.052.052.015.105.026.159.034.053.008.107.012.162.013h.007a1.83 1.83 0 0 1 .41-.025.5.5 0 0 0 .448-.625l-.339-1.016c.293-.066.577-.153.843-.26l.926.926-.843.26a.5.5 0 0 0-.236.903l.994.578.993-.578.412-.714a.5.5 0 0 0-.788-.553l-.412.714-.522-.301a.5.5 0 0 0-.588.106L4.49 12.86l-.236-.902a.5.5 0 0 0-.68-.381l-.993.577-.994-.577.708-.707-.708-.707.176-.176Z"/>
                    </svg>
                    Soruları Kontrol Et
                </button>
            </div>
             <div class="toggle-section">
                <div class="toggle-item">
                    <span class="toggle-label">Kırmızı Tema</span>
                    <label class="switch">
                        <input type="checkbox" id="themeCheckbox" />
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span class="toggle-label">Karanlık Tema</span>
                    <label class="switch">
                        <input type="checkbox" id="themeDarkCheckbox" />
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span class="toggle-label">Gizli Mod</span>
                    <label class="switch">
                        <input type="checkbox" id="stealthCheckbox" />
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-item">
                    <span class="toggle-label">Not Hesapla</span>
                    <label class="switch">
                        <input type="checkbox" id="calculateCheckbox" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <footer class="footer">
            <a class="link" href="https://github.com/Enesuygurs" target="_blank">Güncellemeler ve Bağışlar</a>
            Created by Enes Uygur
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
