<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAÜ Config</title>
    <script src="popup.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="mainArea">
      <a class="baslik">SAÜ Config</a>
      <button id="changeGrades" class="buton">Change Grades</button>
      <button id="autoFillSurvey" class="buton">Auto Fill Survey</button>
      <button id="checkQuestions" class="buton">Check Questions</button>
      <div class="toggleArea">
        <div class="checkbox-wrapper-64">
          <a class="baslik">Red Theme</a>
          <label class="switch">
            <input type="checkbox" id="themeCheckbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="checkbox-wrapper-64">
          <a class="baslik">Dark Theme</a>
          <label class="switch">
            <input type="checkbox" id="themeDarkCheckbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="checkbox-wrapper-64">
          <a class="baslik">Stealth Mode</a>
          <label class="switch">
            <input type="checkbox" id="stealthCheckbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="checkbox-wrapper-64">
          <a class="baslik">Calculate Grade</a>
          <label class="switch">
            <input type="checkbox" id="calculateCheckbox" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
    <a class="coder">Created by Enes Uygur</a>
  </body>
</html>
